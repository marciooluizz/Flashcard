<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinguaDeck - Local-First Language Study</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script type="module" src="js/main.js"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>LinguaDeck</h1>
      <p class="subtitle">Quizlet-inspired, local-first language study</p>
    </div>
    <div class="toolbar">
      <button id="darkModeToggle" aria-label="Toggle dark mode">🌙</button>
      <button id="exportProgressBtn">Export Progress</button>
      <label class="import-progress-btn">Import Progress
        <input id="importProgressInput" type="file" accept="application/json" hidden>
      </label>
    </div>
  </header>

  <main class="app-grid">
    <aside class="panel sidebar">
      <section>
        <h2>Databases</h2>
        <div class="import-actions">
          <label class="file-label">Import Study Set
            <input id="studyImportInput" type="file" accept=".txt,.csv,.xlsx,.xls" multiple hidden>
          </label>
          <label class="file-label">Import Practice Test
            <input id="practiceImportInput" type="file" accept=".json,.txt,.csv,.xlsx,.xls" multiple hidden>
          </label>
        </div>
        <div id="dbList" class="db-list"></div>
      </section>
      <section>
        <h3>Filters</h3>
        <input id="searchInput" placeholder="Search term, translation, tags" />
        <select id="difficultyFilter">
          <option value="">All difficulties</option>
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
        <select id="sortFilter">
          <option value="">Sort: default</option>
          <option value="term-asc">Term A-Z</option>
          <option value="term-desc">Term Z-A</option>
          <option value="difficulty">Difficulty</option>
        </select>
        <label><input type="checkbox" id="favoritesOnly"> Starred only</label>
      </section>
      <section>
        <h3>Speech</h3>
        <label>Learning language
          <select id="learningLang">
            <option value="auto">Auto detect</option>
            <option value="en-US">English (US)</option>
            <option value="en-GB">English (UK)</option>
            <option value="es-ES">Spanish</option>
            <option value="pt-BR">Portuguese (Brazil)</option>
            <option value="pt-PT">Portuguese (Portugal)</option>
            <option value="fr-FR">French</option>
            <option value="de-DE">German</option>
            <option value="it-IT">Italian</option>
            <option value="nl-NL">Dutch</option>
            <option value="ja-JP">Japanese</option>
          </select>
        </label>
        <label>Translation language
          <select id="translationLang">
            <option value="auto">Auto detect</option>
            <option value="en-US">English (US)</option>
            <option value="en-GB">English (UK)</option>
            <option value="es-ES">Spanish</option>
            <option value="pt-BR">Portuguese (Brazil)</option>
            <option value="pt-PT">Portuguese (Portugal)</option>
            <option value="fr-FR">French</option>
            <option value="de-DE">German</option>
            <option value="it-IT">Italian</option>
            <option value="nl-NL">Dutch</option>
            <option value="ja-JP">Japanese</option>
          </select>
        </label>
      </section>
      <section>
        <h3>Merge Study Session</h3>
        <button id="mergeSelectedBtn">Merge Selected Databases</button>
      </section>
    </aside>

    <section class="panel content">
      <nav class="mode-tabs" aria-label="Study modes">
        <button data-mode="dashboard" class="active">Dashboard</button>
        <button data-mode="flashcards">Flashcards</button>
        <button data-mode="learn">Learn</button>
        <button data-mode="test">Test</button>
        <button data-mode="practice">Practice Test</button>
        <button data-mode="match">Match Game</button>
      </nav>

      <section id="statusBar" class="status" aria-live="polite"></section>
      <section id="modeContainer" class="mode-container"></section>
    </section>
  </main>
</body>
</html>
